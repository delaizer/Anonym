<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Юля, ти класна!</title>
  <style>
    /* Основний стиль */
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to right, #f7c7fc, #ff6ec7);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      color: #333;
      overflow: hidden;
      transition: background 1s ease;
    }
    
    /* Контейнер */
    .container {
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      padding: 40px;
      width: 90%;
      max-width: 500px;
      position: relative;
      transform: scale(0.9);
      opacity: 0;
      animation: fadeIn 1s forwards;
    }
    
    /* Анімація для завантаження контейнера */
    @keyframes fadeIn {
      0% {
        opacity: 0;
        transform: scale(0.9);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    h2 {
      font-size: 28px;
      color: #ff69b4;
      margin-bottom: 20px;
      font-weight: bold;
      animation: slideIn 1s ease-out;
    }
    
    /* Анімація для заголовка */
    @keyframes slideIn {
      0% {
        transform: translateX(-100%);
      }
      100% {
        transform: translateX(0);
      }
    }

    p {
      font-size: 18px;
      margin-bottom: 20px;
      line-height: 1.4;
      opacity: 0;
      animation: fadeInText 1.5s ease-in 1s forwards;
    }

    /* Анімація для тексту */
    @keyframes fadeInText {
      0% {
        opacity: 0;
      }
      100% {
        opacity: 1;
      }
    }

    /* Кнопка */
    button {
      padding: 12px 24px;
      background-color: #ff69b4;
      border: none;
      border-radius: 30px;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.3s, box-shadow 0.3s;
      position: relative;
      animation: pulse 1s infinite;
    }

    /* Анімація для кнопки (пульсація) */
    @keyframes pulse {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
      }
    }

    button:hover {
      background-color: #ff3385;
      transform: translateY(-5px);
      box-shadow: 0px 5px 20px rgba(0, 0, 0, 0.2);
    }

    /* Фотографії, які крутяться навколо */
    #photoContainer {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      border-radius: 50%;
      animation: rotatePhotos 15s infinite linear;
      z-index: 1;
    }

    .photo {
      position: absolute;
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 50%;
      opacity: 0;
      animation: fadeInAndRotate 2s ease-out forwards;
    }

    /* Позиціювання фото по колу */
    .photo:nth-child(1) {
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      animation-delay: 0s;
    }
    .photo:nth-child(2) {
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      animation-delay: 0.5s;
    }
    .photo:nth-child(3) {
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      animation-delay: 1s;
    }
    .photo:nth-child(4) {
      top: 50%;
      right: 0;
      transform: translateY(-50%);
      animation-delay: 1.5s;
    }

    /* Анімація для фото при обертанні */
    @keyframes rotatePhotos {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeInAndRotate {
      0% {
        opacity: 0;
        transform: rotate(0deg);
      }
      100% {
        opacity: 1;
        transform: rotate(360deg);
      }
    }

    /* Повідомлення */
    #hiddenMessage {
      display: none;
      margin-top: 20px;
      font-size: 20px;
      color: #4CAF50;
      animation: fadeInMessage 1s ease-in 2s forwards;
    }

    /* Анімація для повідомлення */
    @keyframes fadeInMessage {
      0% {
        opacity: 0;
      }
      100% {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Юля</h2>
    <p>Вибач, що іноді все йде не так. З тобою класно спілкуватись, і я дуже ціную це. Спілкування з тобою прям цікаво. Дякую за те, що ти розлокувала мене, і дала шанс і далі спілкуватись!</p>
    <button onclick="showPhotos()">Натисни сюди</button>
    <div id="photoContainer">
      <img src="photo1.jpg" alt="Фото 1" class="photo">
      <img src="photo2.jpg" alt="Фото 2" class="photo">
      <img src="photo3.jpg" alt="Фото 3" class="photo">
      <img src="photo4.jpg" alt="Фото 4" class="photo">
    </div>
    <p id="hiddenMessage">Ти — дивовижна! 😄</p>
  </div>

  <script>
    // Функція для показу фото і зміни фону
    function showPhotos() {
      document.getElementById("photoContainer").style.display = "block";
      document.body.style.background = "linear-gradient(to right, #ff6ec7, #ffb6c1)";
      document.getElementById("hiddenMessage").style.display = "block";
    }
  </script>
</body>
</html>
